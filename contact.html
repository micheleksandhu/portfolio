<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Michele Sandhu</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Contact Michele Sandhu">
</head>
<body>
    <header class="header">
        <div class="top-bar">
            <a href="index.html" class="site-logo">Michele Sandhu</a>
            <nav>
                <ul class="main-nav">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="explore.html">Blog</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <div class="contact-section">
            <h1>Get in Touch</h1>
            <div class="contact-links">
                <a href="mailto:michelesandhu92@gmail.com" class="contact-link">
                    &#9993; michelesandhu92@gmail.com
                </a>
                <a href="https://www.linkedin.com/in/michele-s-801a42233" target="_blank" rel="noopener" class="contact-link">
                    &#128101; LinkedIn
                </a>
                <a href="https://github.com/micheleksandhu/portfolio" target="_blank" rel="noopener" class="contact-link">
                    &#128187; GitHub
                </a>
            </div>
            <h2 class="contact-form-title">Send a Message</h2>
            <form action="https://formspree.io/f/xdorolrg" method="POST" class="validate">
                <div>
                    <label for="name">Name</label>
                    <input id="name" type="text" name="name" class="form-input">
                </div>
                <div>
                    <label for="email">Email</label>
                    <input id="email" type="email" name="_replyto" class="form-input" required>
                </div>
                <div>
                    <label for="message">Message</label>
                    <textarea id="message" name="message" class="form-input" rows="5" required></textarea>
                </div>
                <div>
                    <input type="submit" value="Send Message">
                </div>
            </form>
        </div>
    </main>
    <footer class="footer">
        <div class="footer-inner">
            <p class="footer-name">Michele Sandhu</p>
            <ul class="footer-nav">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>

                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="footer-social">
                <a href="mailto:michelesandhu92@gmail.com">Email</a>
                <a href="https://www.linkedin.com/in/michele-s-801a42233" target="_blank" rel="noopener">LinkedIn</a>
                <a href="https://github.com/micheleksandhu/portfolio" target="_blank" rel="noopener">GitHub</a>
            </div>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
