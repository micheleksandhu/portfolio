<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Michele Sandhu</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Blog posts by Michele Sandhu on project management, tech, and more">
</head>
<body>
    <header class="header">
        <div class="top-bar">
            <a href="index.html" class="site-logo">Michele Sandhu</a>
            <nav>
                <ul class="main-nav">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="explore.html" class="active">Blog</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="blog-section">
            <h1>Blog</h1>
            <p class="section-note" style="text-align:left; margin-bottom: 2rem;">
                Thoughts on project management, technology, and cross-functional collaboration.
            </p>
            <div id="posts-container">
                <p style="color:#999; font-size:0.9rem;">Loading posts...</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <p class="footer-name">Michele Sandhu</p>
            <ul class="footer-nav">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="explore.html">Blog</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="footer-social">
                <a href="mailto:michelesandhu92@gmail.com">Email</a>
                <a href="https://www.linkedin.com/in/michele-s-801a42233" target="_blank" rel="noopener">LinkedIn</a>
                <a href="https://github.com/micheleksandhu/portfolio" target="_blank" rel="noopener">GitHub</a>
            </div>
        </div>
    </footer>
    <script>
    async function loadPosts() {
        const container = document.getElementById('posts-container');
        const hash = window.location.hash.slice(1);
        try {
            const res = await fetch('https://api.github.com/repos/micheleksandhu/portfolio/contents/_posts');
            if (!res.ok) throw new Error();
            const files = await res.json();
            const mdFiles = files.filter(f => f.name.endsWith('.md')).sort((a,b) => b.name.localeCompare(a.name));
            if (!mdFiles.length) { container.innerHTML = '<p style="color:#999;">No posts yet.</p>'; return; }

            const posts = await Promise.all(mdFiles.map(async f => {
                const r = await fetch(f.download_url);
                return { text: await r.text(), name: f.name };
            }));

            container.innerHTML = posts.map(({text, name}) => {
                const titleMatch = text.match(/^title:\s*"?(.+?)"?\s*$/m);
                const dateMatch  = text.match(/^date:\s*(.+?)\s*$/m);
                const body    = text.replace(/^---[\s\S]+?---/, '').trim();
                const title   = titleMatch ? titleMatch[1] : 'Untitled';
                const date    = dateMatch ? new Date(dateMatch[1]).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}) : '';
                const preview = body.replace(/[#*`]/g,'').slice(0,200) + '...';
                const slug    = name.replace('.md','');
                const fullBody = body.replace(/\n/g,'<br>').replace(/#{1,6}\s(.+)/g,'<strong>$1</strong>');
                const isOpen  = hash === slug;

                return `<article class="blog-post-card" id="${slug}">
                    <p style="font-size:0.72rem;text-transform:uppercase;letter-spacing:1.5px;color:#e63946;margin-bottom:0.5rem;">${date}</p>
                    <h2 style="cursor:pointer;" onclick="togglePost('${slug}')">${title}</h2>
                    <div id="preview-${slug}" style="display:${isOpen?'none':'block'}">
                        <p style="margin-top:0.75rem;">${preview}</p>
                        <button onclick="togglePost('${slug}')" style="margin-top:1rem;background:none;border:none;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;cursor:pointer;text-decoration:underline;color:#111;">Read More</button>
                    </div>
                    <div id="full-${slug}" style="display:${isOpen?'block':'none'};margin-top:1rem;line-height:1.9;font-size:0.95rem;color:#333;">
                        ${fullBody}
                        <button onclick="togglePost('${slug}')" style="margin-top:1.5rem;background:none;border:none;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;cursor:pointer;text-decoration:underline;color:#111;">Collapse</button>
                    </div>
                </article>`;
            }).join('');

            if (hash) {
                setTimeout(() => {
                    const el = document.getElementById(hash);
                    if (el) el.scrollIntoView({behavior:'smooth'});
                }, 100);
            }
        } catch(e) {
            container.innerHTML = '<p style="color:#999;">No posts yet — check back soon.</p>';
        }
    }

    function togglePost(slug) {
        const preview = document.getElementById('preview-' + slug);
        const full    = document.getElementById('full-' + slug);
        const isOpen  = full.style.display === 'block';
        preview.style.display = isOpen ? 'block' : 'none';
        full.style.display    = isOpen ? 'none'  : 'block';
        if (!isOpen) history.replaceState(null, '', '#' + slug);
    }

    loadPosts();
    </script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="script.js"></script>
</body>
</html>
